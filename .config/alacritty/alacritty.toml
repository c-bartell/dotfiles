general.import = ["~/.config/alacritty/fonts/jetbrains-mono.toml", "~/.config/alacritty/custom_themes/catppuccin/catppuccin-mocha.toml", "~/.config/alacritty/bell.toml"]

general.live_config_reload = true

[cursor]
style = { shape = "Block", blinking = "Always" }
blink_interval = 400
blink_timeout = 0
unfocused_hollow = true

[scrolling]
history = 100000

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

[window]
decorations = "buttonless"
dynamic_title = true
title = "1337_hax_tools"
# opacity = 0.1

[window.padding]
x = 5
y = 5
